<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance_App</title>

     <!-- Including Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    
    <script src="index.js" defer></script>

</head>
<div id="error-alert" class="alert alert-danger" style="display: none;" role="alert"></div>
<body>

     <div class="container py-4" style="max-width: 900px;">
 
        <div class="mb-4">
            <h1 class="h3 mb-0">Mutual Fund Catalog</h1>
            <p class="text-muted small mb-0">Add and manage the firm's fund offerings</p>
        </div>
    <!-- Add Fund Form -->
    <div class="card mb-4" id="new-fund-card">
    <div class="card-body">
    <form id="new-fund-form" action="#">
        <h2 class="h5 mb-3">Add Fund</h2>
        <div class="row mb-3">
        <div class="col-md-6">
            <label for="fund-name" class="form-label">Fund Name</label>
            <input type="text" class="form-control" id="fund-name" name="fund-name" placeholder="Vanguard 500 Index">
        </div>
 
        <div class="col-md-6">
            <label for="ticker-symbol" class="form-label">Ticker Symbol</label>
            <input type="text" class="form-control" id="ticker-symbol" name="ticker-symbol" placeholder="VFIAX">
        </div>
        </div>
 
        <div class="row mb-3">
        <div class="col-md-6">
            <label for="category" class="form-label">Category</label>
            <select id="category" class="form-select" name="category">
                <option value="LARGE_CAP">Large Cap</option>
                <option value="SMALL_CAP">Small Cap</option>
                <option value="INTERNATIONAL">International</option>
                <option value="BOND">Bond</option>
                <option value="BALANCED">Balanced</option>
            </select>
        </div>
 
        <div class="col-md-6">
            <label for="nav" class="form-label">Net Asset Value</label>
            <input type="number" step="0.01" class="form-control" id="nav" name="nav" placeholder="432.18">
        </div>
        </div>
        
        <div class="row mb-3">
        <div class="col-md-6">
            <label for="expense-ratio" class="form-label">Expense Ratio</label>
            <input type="number" step="0.01" class="form-control" id="expense-ratio" name="expense-ratio" placeholder="0.04">
        </div>
 
        <div class="col-md-6">
            <label for="fund-manager" class="form-label">Fund Manager</label>
            <input type="text" class="form-control" id="fund-manager" name="fund-manager" placeholder="Michelle Louie">
        </div>
        </div>
        
        <div class="row mb-3">
        <div class="col-md-6">
            <label for="inception-date" class="form-label">Inception Date</label>
            <input type="date" class="form-control" id="inception-date" name="inception-date" placeholder="2000-01-01">
        </div>
        </div>
 
        <div class="d-flex justify-content-end">
        <button type="submit" class="btn btn-primary">Submit</button>
        </div>
 
    </form>
    </div>
    </div>

    <!-- Edit Fund Form -->
     <div class="card mb-4" id="update-fund-card" style="display: none;">
    <div class="card-body">
    <form id="update-fund-form" action="#">
        <h2 class="h5 mb-3">Edit Fund</h2>
        <div class="row mb-3">
        <div class="col-md-6">
            <label for="fund-name" class="form-label">Fund Name</label>
            <input type="text" class="form-control" id="edit-fund-name" name="edit-fund-name">
        </div>
 
        <div class="col-md-6">
            <label for="ticker-symbol" class="form-label">Ticker Symbol</label>
            <input type="text" class="form-control" id="edit-ticker-symbol" name="edit-ticker-symbol">
        </div>
        </div>
 
        <div class="row mb-3">
        <div class="col-md-6">
            <label for="category" class="form-label">Category</label>
            <select id="edit-category" class="form-select" name="edit-category">
                <option value="LARGE_CAP">Large Cap</option>
                <option value="SMALL_CAP">Small Cap</option>
                <option value="INTERNATIONAL">International</option>
                <option value="BOND">Bond</option>
                <option value="BALANCED">Balanced</option>
            </select>
        </div>
 
        <div class="col-md-6">
            <label for="nav" class="form-label">Net Asset Value</label>
            <input type="number" step="0.01" class="form-control" id="edit-nav" name="edit-nav">
        </div>
        </div>
        
        <div class="row mb-3">
        <div class="col-md-6">
            <label for="expense-ratio" class="form-label">Expense Ratio</label>
            <input type="number" step="0.01" class="form-control" id="edit-expense-ratio" name="edit-expense-ratio">
        </div>
 
        <div class="col-md-6">
            <label for="fund-manager" class="form-label">Fund Manager</label>
            <input type="text" class="form-control" id="edit-fund-manager" name="edit-fund-manager">
        </div>
        </div>
        
        <div class="row mb-3">
        <div class="col-md-6">
            <label for="inception-date" class="form-label">Inception Date</label>
            <input type="date" class="form-control" id="edit-inception-date" name="edit-inception-date">
        </div>
        </div>
 
        <div class="d-flex justify-content-end">
        <button type="submit" class="btn btn-primary">Submit</button>
        </div>
 
    </form>
    </div>
    </div>

    <!-- Delete Fund Form -->
     <div class="card mb-4" id="delete-fund-card" style="display: none;">
    <div class="card-body">
    <form id="delete-fund-form" action="#">
        <h2 class="h5 mb-3">Delete Fund</h2>
        <div class="row mb-3">
        <div class="col-md-6">
            <label for="fund-name" class="form-label">Fund Name</label>
            <input type="text" class="form-control" id="delete-fund-name" name="delete-fund-name" disabled>
        </div>
 
        <div class="col-md-6">
            <label for="ticker-symbol" class="form-label">Ticker Symbol</label>
            <input type="text" class="form-control" id="delete-ticker-symbol" name="delete-ticker-symbol" disabled>
        </div>
        </div>
 
        <div class="row mb-3">
        <div class="col-md-6">
            <label for="category" class="form-label">Category</label>
            <select id="delete-category" class="form-select" name="delete-category" disabled>
                <option value="LARGE_CAP">Large Cap</option>
                <option value="SMALL_CAP">Small Cap</option>
                <option value="INTERNATIONAL">International</option>
                <option value="BOND">Bond</option>
                <option value="BALANCED">Balanced</option>
            </select>
        </div>
 
        <div class="col-md-6">
            <label for="nav" class="form-label">Net Asset Value</label>
            <input type="number" step="0.01" class="form-control" id="delete-nav" name="delete-nav" disabled>
        </div>
        </div>
        
        <div class="row mb-3">
        <div class="col-md-6">
            <label for="expense-ratio" class="form-label">Expense Ratio</label>
            <input type="number" step="0.01" class="form-control" id="delete-expense-ratio" name="delete-expense-ratio" disabled>
        </div>
 
        <div class="col-md-6">
            <label for="fund-manager" class="form-label">Fund Manager</label>
            <input type="text" class="form-control" id="delete-fund-manager" name="delete-fund-manager" disabled>
        </div>
        </div>
        
        <div class="row mb-3">
        <div class="col-md-6">
            <label for="inception-date" class="form-label">Inception Date</label>
            <input type="date" class="form-control" id="delete-inception-date" name="delete-inception-date" disabled>
        </div>
        </div>
 
        <div class="d-flex justify-content-end">
        <button type="submit" class="btn btn-primary">Submit</button>
        </div>
 
    </form>
    </div>
    </div>
 
    <div class="card">
    <div class="card-header bg-white">
        <h2 class="h5 mb-0">Fund Catalog</h2>
    </div>
    <div class="card-body p-0">
    <div class="table-responsive">
    <table id="funds-table" class="table table-striped table-hover my-4">
        <thead>
            <tr>
                <th>Fund Name</th>
                <th>Ticker</th>
                <th>Category</th>
                <th>Expense Ratio</th>
                <th>NAV</th>
                <th>Manager</th>
                <th>Inception Date</th>
                <th>Edit</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody id="funds-table-body">
            <!-- I will add data here! -->
        </tbody>
        
    </table>
</div>
</div>
</div>
</div>

 <!-- Including Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
